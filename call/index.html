<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Голосовой звонок</title>
<!-- Firebase compat SDKs — accessible from Russia, no PeerJS signalling server needed -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #ffe4ef;
    color: #1a202c;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .container {
    width: 100%;
    max-width: 420px;
  }

  .phone-icon {
    text-align: center;
    font-size: 4rem;
    margin-bottom: 0.4rem;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 0.4rem;
    color: #2d3748;
  }

  .subtitle {
    text-align: center;
    color: #718096;
    font-size: 1.15rem;
    margin-bottom: 1.8rem;
    line-height: 1.6;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 2rem 1.8rem;
    margin-bottom: 1rem;
    box-shadow: 0 2px 14px rgba(0,0,0,0.09);
  }

  .code-label {
    text-align: center;
    font-size: 1.2rem;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 1.2rem;
  }

  .digits {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1.6rem;
  }

  .digit-input {
    width: 90px;
    height: 110px;
    text-align: center;
    font-weight: 700;
    border: 3px solid #cbd5e0;
    border-radius: 16px;
    background: #f7fafc;
    color: #2d3748;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: transparent;
    font-size: clamp(2rem, 8vw, 3.5rem);
  }

  .digit-input:focus {
    border-color: #4299e1;
    box-shadow: 0 0 0 4px rgba(66,153,225,0.2);
    background: #ebf8ff;
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.7rem;
    margin-bottom: 1.4rem;
  }

  .numpad-btn {
    padding: 1rem 0;
    font-size: 1.8rem;
    font-weight: 700;
    background: #edf2f7;
    color: #2d3748;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .numpad-btn:hover { background: #e2e8f0; }
  .numpad-btn:active { background: #cbd5e0; transform: scale(0.95); }

  .numpad-btn.del {
    font-size: 1.4rem;
    background: #fed7d7;
    color: #c53030;
  }
  .numpad-btn.del:hover { background: #feb2b2; }

  .numpad-btn.zero { grid-column: 2; }

  button.btn-call {
    width: 100%;
    padding: 1.3rem;
    font-size: 1.6rem;
    font-weight: 700;
    background: #38a169;
    color: #fff;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  button.btn-call:hover { background: #2f855a; }
  button.btn-call:active { transform: scale(0.97); }
  button.btn-call:disabled {
    background: #a0aec0;
    color: #e2e8f0;
    cursor: not-allowed;
    transform: none;
  }

  button.btn-hangup {
    width: 100%;
    padding: 1.3rem;
    font-size: 1.6rem;
    font-weight: 700;
    background: #e53e3e;
    color: #fff;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    margin-top: 1.2rem;
    transition: background 0.2s, transform 0.1s;
  }
  button.btn-hangup:hover { background: #c53030; }
  button.btn-hangup:active { transform: scale(0.97); }

  .status-area {
    text-align: center;
    padding: 1.5rem 0 0.5rem;
  }

  .status-dot {
    display: inline-block;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    margin-right: 0.5rem;
    vertical-align: middle;
  }

  .dot-waiting   { background: #ecc94b; animation: pulse 1.5s infinite; }
  .dot-connected { background: #38a169; }
  .dot-off       { background: #a0aec0; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.25; }
  }

  .status-text {
    font-size: 1.35rem;
    vertical-align: middle;
    color: #4a5568;
  }

  .timer {
    font-size: 3.2rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    margin-top: 0.8rem;
    color: #2b6cb0;
  }

  .visualizer {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
    height: 50px;
    margin-top: 1rem;
  }

  .bar {
    width: 7px;
    background: #4299e1;
    border-radius: 3px;
    transition: height 0.05s;
    min-height: 4px;
  }

  .hint {
    text-align: center;
    color: #a0aec0;
    font-size: 1rem;
    margin-top: 1rem;
    line-height: 1.6;
  }

  .hidden { display: none; }

  .error-banner {
    background: #fff5f5;
    border: 2px solid #fc8181;
    border-radius: 14px;
    padding: 1.1rem 1.4rem;
    margin-bottom: 1rem;
    font-size: 1.1rem;
    color: #c53030;
    line-height: 1.5;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <div class="phone-icon">&#128222;</div>
  <h1>Голосовой звонок</h1>
  <p class="subtitle">Введите ваш секретный код из трёх цифр<br>и нажмите «Позвонить»</p>

  <!-- Join card -->
  <div class="card" id="joinCard">
    <div class="code-label">Введите код:</div>

    <div class="digits">
      <input class="digit-input" id="d0" type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" readonly>
      <input class="digit-input" id="d1" type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" readonly>
      <input class="digit-input" id="d2" type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" readonly>
    </div>

    <div class="numpad">
      <button class="numpad-btn" data-n="1">1</button>
      <button class="numpad-btn" data-n="2">2</button>
      <button class="numpad-btn" data-n="3">3</button>
      <button class="numpad-btn" data-n="4">4</button>
      <button class="numpad-btn" data-n="5">5</button>
      <button class="numpad-btn" data-n="6">6</button>
      <button class="numpad-btn" data-n="7">7</button>
      <button class="numpad-btn" data-n="8">8</button>
      <button class="numpad-btn" data-n="9">9</button>
      <button class="numpad-btn del" id="delBtn">&#9003;</button>
      <button class="numpad-btn zero" data-n="0">0</button>
    </div>

    <button class="btn-call" id="joinBtn" disabled>Позвонить</button>
  </div>

  <!-- Status card (shown while in/after call) -->
  <div class="card hidden" id="callCard">
    <div class="status-area">
      <span class="status-dot dot-waiting" id="statusDot"></span>
      <span class="status-text" id="statusText">Ждём второго участника...</span>
      <div class="timer hidden" id="timer">00:00</div>
      <div class="visualizer hidden" id="visualizer"></div>
    </div>
    <button class="btn-hangup hidden" id="hangupBtn">Положить трубку</button>
  </div>

  <div class="error-banner hidden" id="errorBanner"></div>

  <p class="hint" id="hintText">Договоритесь о коде заранее — оба вводят одно и то же.</p>

  <audio id="remoteAudio" autoplay playsinline></audio>
</div>

<script>
(() => {
  'use strict';

  // ── Firebase configuration ────────────────────────────────────────────────
  var FB_CONFIG = {
    apiKey:            'AIzaSyCyBaPXKUiY8qZhgFJZihzsbrmaG5X-My8',
    authDomain:        'drprosk-call.firebaseapp.com',
    databaseURL:       'https://drprosk-call-default-rtdb.firebaseio.com',
    projectId:         'drprosk-call',
    storageBucket:     'drprosk-call.firebasestorage.app',
    messagingSenderId: '125896900326',
    appId:             '1:125896900326:web:bd209363fd4bfbd3680527'
  };

  // ── ICE servers (non-Google STUN + free TURN; works in Russia) ───────────
  var ICE_CFG = {
    iceServers: [
      { urls: 'stun:stun.cloudflare.com:3478' },
      { urls: 'stun:stun.relay.metered.ca:80' },
      { urls: 'turn:openrelay.metered.ca:80',
        username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443',
        username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443?transport=tcp',
        username: 'openrelayproject', credential: 'openrelayproject' }
    ]
  };

  // ── DOM ───────────────────────────────────────────────────────────────────
  var $ = function(id) { return document.getElementById(id); };
  var digits      = [$('d0'), $('d1'), $('d2')];
  var joinBtn     = $('joinBtn');
  var joinCard    = $('joinCard');
  var callCard    = $('callCard');
  var statusDot   = $('statusDot');
  var statusText  = $('statusText');
  var timerEl     = $('timer');
  var hangupBtn   = $('hangupBtn');
  var visualizer  = $('visualizer');
  var remoteAudio = $('remoteAudio');
  var hintText    = $('hintText');
  var delBtn      = $('delBtn');
  var errorBanner = $('errorBanner');

  // ── State ─────────────────────────────────────────────────────────────────
  var pc           = null;
  var localStream  = null;
  var roomRef      = null;
  var fbListeners  = [];   // [{ref, event, cb}]
  var timerInterval = null;
  var callStart    = 0;
  var analyserNode = null;
  var animFrame    = null;

  // ── Numpad ────────────────────────────────────────────────────────────────
  function getCode() { return digits.map(function(d) { return d.value; }).join(''); }
  function updateCallBtn() { joinBtn.disabled = getCode().length < 3; }

  document.querySelectorAll('.numpad-btn[data-n]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var code = getCode();
      if (code.length >= 3) return;
      digits[code.length].value = btn.dataset.n;
      updateCallBtn();
    });
  });

  delBtn.addEventListener('click', function() {
    var code = getCode();
    if (!code.length) return;
    digits[code.length - 1].value = '';
    updateCallBtn();
  });

  document.addEventListener('keydown', function(e) {
    if (pc) return;
    if (e.key >= '0' && e.key <= '9') {
      var code = getCode();
      if (code.length < 3) { digits[code.length].value = e.key; updateCallBtn(); }
    } else if (e.key === 'Backspace') {
      var code = getCode();
      if (code.length > 0) { digits[code.length - 1].value = ''; updateCallBtn(); }
    } else if (e.key === 'Enter') {
      if (!joinBtn.disabled) join();
    }
  });

  // ── UI helpers ────────────────────────────────────────────────────────────
  function setStatus(state, text) {
    var cls = { waiting: 'dot-waiting', connected: 'dot-connected', off: 'dot-off' };
    statusDot.className = 'status-dot ' + (cls[state] || 'dot-off');
    statusText.textContent = text;
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.remove('hidden');
  }

  function hideError() { errorBanner.classList.add('hidden'); }

  function startTimer() {
    callStart = Date.now();
    timerEl.classList.remove('hidden');
    timerInterval = setInterval(function() {
      var s = Math.floor((Date.now() - callStart) / 1000);
      timerEl.textContent =
        String(Math.floor(s / 60)).padStart(2, '0') + ':' +
        String(s % 60).padStart(2, '0');
    }, 500);
  }

  function stopTimer() { clearInterval(timerInterval); timerEl.classList.add('hidden'); }

  function setupVisualizer(stream) {
    if (!stream) return;
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var src = ctx.createMediaStreamSource(stream);
      analyserNode = ctx.createAnalyser();
      analyserNode.fftSize = 64;
      src.connect(analyserNode);
      visualizer.innerHTML = '';
      for (var i = 0; i < 16; i++) {
        var bar = document.createElement('div');
        bar.className = 'bar';
        visualizer.appendChild(bar);
      }
      visualizer.classList.remove('hidden');
      var bars = visualizer.querySelectorAll('.bar');
      var data = new Uint8Array(analyserNode.frequencyBinCount);
      function draw() {
        analyserNode.getByteFrequencyData(data);
        bars.forEach(function(bar, i) {
          bar.style.height = Math.max(4, ((data[i] || 0) / 255) * 48) + 'px';
        });
        animFrame = requestAnimationFrame(draw);
      }
      draw();
    } catch (e) { /* visualizer is cosmetic; ignore errors */ }
  }

  function stopVisualizer() {
    cancelAnimationFrame(animFrame);
    visualizer.classList.add('hidden');
  }

  // ── Firebase listener management ─────────────────────────────────────────
  function fbListen(ref, event, cb) {
    ref.on(event, cb);
    fbListeners.push({ ref: ref, event: event, cb: cb });
  }

  function fbRemoveAll() {
    fbListeners.forEach(function(l) { l.ref.off(l.event, l.cb); });
    fbListeners = [];
  }

  // ── Call teardown ─────────────────────────────────────────────────────────
  function endCall() {
    fbRemoveAll();
    if (pc) { try { pc.close(); } catch(e) {} pc = null; }
    if (localStream) {
      localStream.getTracks().forEach(function(t) { t.stop(); });
      localStream = null;
    }
    remoteAudio.srcObject = null;
    if (roomRef) { roomRef.remove().catch(function() {}); roomRef = null; }
    stopTimer();
    stopVisualizer();
    hangupBtn.classList.add('hidden');
    callCard.classList.add('hidden');
    // "\u0417\u0432\u043e\u043d\u043e\u043a \u0437\u0430\u0432\u0435\u0440\u0448\u0451\u043d" = "Звонок завершён"
    setStatus('off', '\u0417\u0432\u043e\u043d\u043e\u043a \u0437\u0430\u0432\u0435\u0440\u0448\u0451\u043d');
    digits.forEach(function(d) { d.value = ''; });
    updateCallBtn();
    joinCard.classList.remove('hidden');
    hintText.classList.remove('hidden');
  }

  hangupBtn.addEventListener('click', endCall);

  // ── Create RTCPeerConnection ───────────────────────────────────────────────
  function createPC() {
    pc = new RTCPeerConnection(ICE_CFG);

    localStream.getTracks().forEach(function(t) { pc.addTrack(t, localStream); });

    pc.ontrack = function(e) {
      remoteAudio.srcObject = e.streams[0];
    };

    pc.onconnectionstatechange = function() {
      var s = pc ? pc.connectionState : '';
      if (s === 'connected') {
        // "\u0412\u044b \u043d\u0430 \u0441\u0432\u044f\u0437\u0438!" = "Вы на связи!"
        setStatus('connected', '\u0412\u044b \u043d\u0430 \u0441\u0432\u044f\u0437\u0438! \uD83C\uDF89');
        hangupBtn.classList.remove('hidden');
        hintText.classList.add('hidden');
        startTimer();
        setTimeout(function() { setupVisualizer(remoteAudio.srcObject); }, 400);
      } else if (s === 'disconnected' || s === 'failed' || s === 'closed') {
        endCall();
      }
    };

    // Fallback: also watch ICE connection state (better Safari support)
    pc.oniceconnectionstatechange = function() {
      var s = pc ? pc.iceConnectionState : '';
      if (s === 'connected' || s === 'completed') {
        if (statusDot.className.indexOf('dot-connected') === -1) {
          setStatus('connected', '\u0412\u044b \u043d\u0430 \u0441\u0432\u044f\u0437\u0438! \uD83C\uDF89');
          hangupBtn.classList.remove('hidden');
          hintText.classList.add('hidden');
          if (!timerInterval) startTimer();
          setTimeout(function() { setupVisualizer(remoteAudio.srcObject); }, 400);
        }
      } else if (s === 'failed') {
        endCall();
      }
    };

    return pc;
  }

  // ── Caller flow ───────────────────────────────────────────────────────────
  async function startAsCaller() {
    createPC();

    pc.onicecandidate = function(e) {
      if (e.candidate) roomRef.child('callerCandidates').push(e.candidate.toJSON());
    };

    var offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await roomRef.child('offer').set({ type: offer.type, sdp: offer.sdp });

    // "\u0416\u0434\u0451\u043c \u0432\u0442\u043e\u0440\u043e\u0433\u043e \u0443\u0447\u0430\u0441\u0442\u043d\u0438\u043a\u0430..." = "Ждём второго участника..."
    setStatus('waiting', '\u0416\u0434\u0451\u043c \u0432\u0442\u043e\u0440\u043e\u0433\u043e \u0443\u0447\u0430\u0441\u0442\u043d\u0438\u043a\u0430...');

    // Wait for answer
    fbListen(roomRef.child('answer'), 'value', function(snap) {
      if (snap.exists() && pc && !pc.currentRemoteDescription) {
        pc.setRemoteDescription(new RTCSessionDescription(snap.val())).catch(function(e) {
          console.error('setRemoteDescription error', e);
        });
      }
    });

    // Receive callee ICE candidates
    fbListen(roomRef.child('calleeCandidates'), 'child_added', function(snap) {
      if (snap.exists() && pc) {
        pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(function() {});
      }
    });
  }

  // ── Callee flow ───────────────────────────────────────────────────────────
  async function startAsCallee(offerData) {
    createPC();

    pc.onicecandidate = function(e) {
      if (e.candidate) roomRef.child('calleeCandidates').push(e.candidate.toJSON());
    };

    await pc.setRemoteDescription(new RTCSessionDescription(offerData));

    // Receive caller ICE candidates (including ones already stored)
    fbListen(roomRef.child('callerCandidates'), 'child_added', function(snap) {
      if (snap.exists() && pc) {
        pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(function() {});
      }
    });

    var answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await roomRef.child('answer').set({ type: answer.type, sdp: answer.sdp });

    // "\u0421\u043e\u0435\u0434\u0438\u043d\u044f\u0435\u043c\u0441\u044f..." = "Соединяемся..."
    setStatus('waiting', '\u0421\u043e\u0435\u0434\u0438\u043d\u044f\u0435\u043c\u0441\u044f...');
  }

  // ── Main join flow ────────────────────────────────────────────────────────
  async function join() {
    var code = getCode();
    if (code.length < 3) return;

    joinCard.classList.add('hidden');
    callCard.classList.remove('hidden');
    hideError();

    // "\u0412\u043a\u043b\u044e\u0447\u0430\u0435\u043c \u043c\u0438\u043a\u0440\u043e\u0444\u043e\u043d..." = "Включаем микрофон..."
    setStatus('waiting', '\u0412\u043a\u043b\u044e\u0447\u0430\u0435\u043c \u043c\u0438\u043a\u0440\u043e\u0444\u043e\u043d...');

    // Check mic API
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      callCard.classList.add('hidden');
      joinCard.classList.remove('hidden');
      showError('\u26A0\uFE0F \u0411\u0440\u0430\u0443\u0437\u0435\u0440 \u0437\u0430\u0431\u043b\u043e\u043a\u0438\u0440\u043e\u0432\u0430\u043b \u043c\u0438\u043a\u0440\u043e\u0444\u043e\u043d. \u0423\u0431\u0435\u0434\u0438\u0442\u0435\u0441\u044c, \u0447\u0442\u043e \u0430\u0434\u0440\u0435\u0441 \u043d\u0430\u0447\u0438\u043d\u0430\u0435\u0442\u0441\u044f \u0441 https://');
      return;
    }

    // Request mic
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch (e) {
      callCard.classList.add('hidden');
      joinCard.classList.remove('hidden');
      if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
        showError('\uD83C\uDFA4 \u041d\u0443\u0436\u043d\u043e \u0440\u0430\u0437\u0440\u0435\u0448\u0438\u0442\u044c \u0434\u043e\u0441\u0442\u0443\u043f \u043a \u043c\u0438\u043a\u0440\u043e\u0444\u043e\u043d\u0443. \u041d\u0430\u0436\u043c\u0438\u0442\u0435 \u00ab\u0420\u0430\u0437\u0440\u0435\u0448\u0438\u0442\u044c\u00bb \u043a\u043e\u0433\u0434\u0430 \u0431\u0440\u0430\u0443\u0437\u0435\u0440 \u0441\u043f\u0440\u043e\u0441\u0438\u0442.');
      } else if (e.name === 'NotFoundError') {
        showError('\uD83C\uDFA4 \u041c\u0438\u043a\u0440\u043e\u0444\u043e\u043d \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d. \u041f\u0440\u043e\u0432\u0435\u0440\u044c\u0442\u0435, \u0447\u0442\u043e \u043e\u043d \u043f\u043e\u0434\u043a\u043b\u044e\u0447\u0451\u043d.');
      } else {
        showError('\u26A0\uFE0F \u041d\u0435 \u0443\u0434\u0430\u043b\u043e\u0441\u044c \u0432\u043a\u043b\u044e\u0447\u0438\u0442\u044c \u043c\u0438\u043a\u0440\u043e\u0444\u043e\u043d. \u041f\u043e\u043f\u0440\u043e\u0431\u0443\u0439\u0442\u0435 \u043f\u0435\u0440\u0435\u0437\u0430\u0433\u0440\u0443\u0437\u0438\u0442\u044c \u0441\u0442\u0440\u0430\u043d\u0438\u0446\u0443.');
      }
      return;
    }
    hideError();

    // "\u041f\u043e\u0434\u043a\u043b\u044e\u0447\u0430\u0435\u043c\u0441\u044f..." = "Подключаемся..."
    setStatus('waiting', '\u041f\u043e\u0434\u043a\u043b\u044e\u0447\u0430\u0435\u043c\u0441\u044f...');

    // Init Firebase (only once)
    if (!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    var db = firebase.database();
    roomRef = db.ref('rooms/vc-' + code);

    try {
      // Check if a caller already exists (offer present)
      var offerSnap = await roomRef.child('offer').get();

      if (!offerSnap.exists()) {
        // We are the CALLER — create offer, wait for callee
        await startAsCaller();
      } else {
        // We are the CALLEE — read offer, send answer
        await startAsCallee(offerSnap.val());
      }
    } catch (err) {
      console.error('Signaling error:', err);
      // Reset UI
      if (localStream) { localStream.getTracks().forEach(function(t) { t.stop(); }); localStream = null; }
      fbRemoveAll();
      if (roomRef) { roomRef.remove().catch(function() {}); roomRef = null; }
      if (pc) { try { pc.close(); } catch(e) {} pc = null; }
      callCard.classList.add('hidden');
      joinCard.classList.remove('hidden');
      digits.forEach(function(d) { d.value = ''; });
      updateCallBtn();
      showError('\u26A0\uFE0F \u041e\u0448\u0438\u0431\u043a\u0430 \u0441\u043e\u0435\u0434\u0438\u043d\u0435\u043d\u0438\u044f: ' +
        (err.message || String(err)) +
        '. \u041f\u0440\u043e\u0432\u0435\u0440\u044c\u0442\u0435 \u0438\u043d\u0442\u0435\u0440\u043d\u0435\u0442 \u0438 \u043f\u043e\u043f\u0440\u043e\u0431\u0443\u0439\u0442\u0435 \u0435\u0449\u0451 \u0440\u0430\u0437.');
    }
  }

  joinBtn.addEventListener('click', join);
})();
</script>
</body>
</html>
