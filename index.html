<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="bingbot" content="noindex, nofollow">
    <meta http-equiv="X-Robots-Tag" content="noindex, nofollow, noarchive">
    <title>VIP Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #e2b04a, #f0d78c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { color: #888; margin-bottom: 2rem; }
        .tools { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
        .tool-card {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            text-decoration: none;
            color: #eee;
            transition: transform 0.2s, border-color 0.2s;
            min-width: 200px;
        }
        .tool-card:hover {
            transform: translateY(-3px);
            border-color: #e2b04a;
        }
        .tool-card h3 { margin-bottom: 0.3rem; }
        .tool-card small { color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VIP Portal</h1>
        <p>Personal tools &amp; dashboards</p>
        <div class="tools">
            <!-- Add your personal tool links here -->
            <a class="tool-card" href="#">
                <h3>Coming Soon</h3>
                <small>Add your tools here</small>
            </a>
        </div>
    </div>
</body>
</html>
